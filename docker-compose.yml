services:
  postgres:
    image: postgres:16-alpine
    container_name: mapriconf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mapriconf_admin
      POSTGRES_USER: mapriconf
      POSTGRES_PASSWORD: mapriconf123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapriconf -d mapriconf_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
